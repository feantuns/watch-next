<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Film reel outer circle -->
  <circle cx="32" cy="32" r="28" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Film reel inner circle (hub) -->
  <circle cx="32" cy="32" r="10" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Center hole -->
  <circle cx="32" cy="32" r="3.5" fill="#e2e8f0"/>
  <!-- Sprocket holes around the reel (6 holes) -->
  <circle cx="32" cy="10" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="32" cy="54" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="10" cy="32" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="54" cy="32" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="16.1" cy="16.1" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="47.9" cy="47.9" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="47.9" cy="16.1" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="16.1" cy="47.9" r="3.5" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Spokes -->
  <line x1="32" y1="22" x2="32" y2="42" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="42" y2="32" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24.9" y1="24.9" x2="39.1" y2="39.1" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39.1" y1="24.9" x2="24.9" y2="39.1" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
</svg>
